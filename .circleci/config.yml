version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:20.11
    environment:
      ENV: DEV
    steps:
      - checkout

      - run:
          name: Show Node and npm versions
          command: |
            node -v
            npm -v

      - run:
          name: Install dependencies
          command: npm install

      - run:
          name: Run tests
          command: npm test

workflows:
  version: 2
  pipeline:
    jobs:
      - build